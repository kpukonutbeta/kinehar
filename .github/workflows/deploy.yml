name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, retheme-again]

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Docs
        working-directory: documentation
        run: |
          npm install
          npm run docs:build

      - name: Prepare Deployment
        run: |
          mkdir -p staging
          # Salin file web utama (index.html, dll) ke folder staging
          # Exclude folder source docs dan file sistem agar bersih
          rsync -av . staging/ --exclude documentation --exclude .git --exclude .github --exclude staging --exclude node_modules
          # Buat folder khusus dokumentasi di dalam staging
          mkdir -p staging/documentation
          # Salin hasil build VitePress ke folder tersebut
          cp -R documentation/.vitepress/dist/* staging/documentation/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    
    permissions:
      contents: read
      pages: write
      id-token: write
