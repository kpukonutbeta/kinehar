name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, retheme-again]

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Docs
        working-directory: documentation
        run: |
          npm install
          npm run docs:build

      - name: Prepare Deployment
        run: |
          mkdir -p staging
          
          # 1. Salin aplikasi utama ke root staging
          rsync -av . staging/ --exclude documentation --exclude .git --exclude .github --exclude staging --exclude node_modules
          
          # 2. Pastikan folder documentation ada di staging
          mkdir -p staging/documentation
          
          # 3. Salin hasil build VitePress ke subfolder documentation
          if [ -d "documentation/.vitepress/dist" ]; then
            cp -R documentation/.vitepress/dist/* staging/documentation/
            echo "VitePress build files copied successfully."
          else
            echo "Error: VitePress build directory not found!"
            exit 1
          fi

          # 4. Tambahkan file .nojekyll (PENTING untuk GitHub Pages)
          touch staging/.nojekyll
          touch staging/documentation/.nojekyll

          # 5. Debug: Lihat struktur akhir
          echo "Final structure in staging:"
          ls -R staging | head -n 20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
    
    permissions:
      contents: read
      pages: write
      id-token: write
